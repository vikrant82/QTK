[package]
name = "qtk-core"
version = "0.1.0"
edition = "2021"
description = "Heavy parsers sidecar for QTK — JSON-RPC over stdin/stdout"
license = "MIT"
authors = ["fivelidz"]
repository = "https://github.com/qalarc/QTK"
readme = "README.md"
publish = false

[[bin]]
name = "qtk-core"
path = "src/main.rs"

[dependencies]
# Lean dep set on purpose — fewer attack-surface concerns, faster builds.
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
regex = "1.10"
quick-xml = "0.36"

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1
strip = true

[lints.rust]
unsafe_code = "deny"

[lints.clippy]
all = { level = "warn", priority = -1 }
pedantic = { level = "warn", priority = -1 }
# Tolerate idiomatic format! usage — the hot paths aren't here.
format_push_string = "allow"
needless_raw_string_hashes = "allow"
unnecessary_wraps = "allow"
match_same_arms = "allow"
missing_errors_doc = "allow"
missing_panics_doc = "allow"
must_use_candidate = "allow"
cast_possible_truncation = "allow"
items_after_statements = "allow"
manual_range_contains = "allow"
too_many_lines = "allow"
doc_markdown = "allow"
ptr_arg = "allow"
