# Complete QTK runtime config sample.
# Project config: <opencode project>/.opencode/qtk.toml
# Global config:  ~/.config/qtk/qtk.toml  (or $XDG_CONFIG_HOME/qtk/qtk.toml)
# Project config is merged over global config.

[qtk]
enabled = true
log_level = "info"          # debug | info | warn | error
dedup_ttl_seconds = 60      # session cache TTL for identical outputs

[qtk.compression]
min_input_bytes = 200       # below this, only redaction/cache pass-through runs

[qtk.rewrite]
enabled = true              # safe Bash quiet rewrites before execution

[qtk.redaction]
enabled = true              # model-facing redaction; tee files still redact on write

[qtk.sidecar]
enabled = true              # optional qtk-core Rust parsers if binary is installed
request_timeout_ms = 1000
startup_timeout_ms = 1500
max_restarts = 3
min_input_bytes = 200
disabled = [
  # "sidecar:terraform-plan",
  # "sidecar:kubectl-structured",
  # "sidecar:cargo-json",
  # "sidecar:junit-xml",

  # Short names are also accepted:
  # "terraform-plan",
  # "kubectl-structured",
  # "cargo-json",
  # "junit-xml",
]

[qtk.tee]
enabled = true
directory = ".opencode/qtk-tee"       # relative to project root; must stay inside it
mode = "failures_and_compressed"      # always | failures_and_compressed | never
prune_days = 7

[qtk.stats]
enabled = true
database = ".opencode/qtk-stats.sqlite"

[qtk.filters]
bundled = true              # load packaged RTK-compatible filters
project = true              # load .opencode/qtk/filters/*.toml
disabled = [
  # Disable specific loaded filter names if they are too aggressive.
  # Project filters accept "project:<name>" or "dsl:project:<name>":
  # "project:noisy-local-filter",

  # Bundled filters accept "bundled:<name>" or "dsl:bundled:<name>".
  # All bundled filter names are listed here as commented examples:
  # "dsl:bundled:ansible-playbook",
  # "dsl:bundled:basedpyright",
  # "dsl:bundled:biome",
  # "dsl:bundled:brew-install",
  # "dsl:bundled:bundle-install",
